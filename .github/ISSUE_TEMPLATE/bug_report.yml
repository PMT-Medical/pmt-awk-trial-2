name: Bug Report
description: Report a bug or unexpected behavior.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out all fields so we can reproduce and fix it quickly.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: One sentence describing the bug.
      placeholder: "e.g. Login button does nothing on mobile Safari"
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severely does this impact your workflow?
      options:
        - Critical — system is unusable
        - High — major feature broken
        - Medium — workaround exists
        - Low — minor inconvenience
    validations:
      required: true

  - type: dropdown
    id: team
    attributes:
      label: Affected Team
      description: Which team owns the affected area?
      options:
        - backend
        - frontend
        - infrastructure
        - unknown
    validations:
      required: false

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Exact steps to reproduce the behavior.
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include any error messages or stack traces.
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, browser, app version, or other relevant context.
      placeholder: "e.g. macOS 14.4, Chrome 124, app v2.3.1"
    validations:
      required: false
