name: Review Tracer

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to inspect and review.
        required: true
        type: number
  issues:
    types: [labeled]

permissions:
  actions: write
  checks: read
  contents: read
  issues: write
  pull-requests: write

# Concurrency is issue-scoped for the label trigger (issue number is derivable
# before we know the PR) and PR-scoped for manual dispatch.
concurrency:
  group: review-tracer-${{ github.event_name == 'issues' && github.event.issue.number || inputs.pr_number }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve trigger and find linked PR
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      issue_number: ${{ steps.resolve.outputs.issue_number }}
      should_run: ${{ steps.resolve.outputs.should_run }}
      needs_body_patch: ${{ steps.resolve.outputs.needs_body_patch }}

    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}

    steps:
      - name: Resolve trigger and find linked PR
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "pr_number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
            echo "issue_number=" >> "$GITHUB_OUTPUT"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "needs_body_patch=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # issues: labeled path — apply guard filters.
          label_name="${{ github.event.label.name }}"
          issue_number="${{ github.event.issue.number }}"

          if [[ "$label_name" != "needs-review" ]]; then
            echo "Label '${label_name}' is not needs-review — skipping." >&2
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Re-fetch the issue to avoid relying solely on the event payload.
          issue_json="$(gh api "repos/${REPOSITORY}/issues/${issue_number}")"
          issue_labels="$(jq -r '[.labels[].name] | join(",")' <<<"$issue_json")"

          # Exact match: pad with commas so pr-open is not a substring of another label.
          if ! echo ",$issue_labels," | grep -q ",pr-open,"; then
            echo "Issue #${issue_number} does not have pr-open — skipping." >&2
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Discover the linked PR using three ordered paths:
          # 1. Branch naming convention (agent/issue-{N}-*): AWK tracer PRs always use this name.
          # 2. Durable issue reference in PR body (Closes/Fixes/Resolves/Relates to #N):
          #    Copilot and other agents may use different branch names; the body keyword
          #    is the most portable GitHub signal linking a PR to an issue.
          # 3. Copilot-authored PR when the issue has a known Copilot assignee:
          #    Copilot may strip the Relates to #N body reference from its final PR,
          #    so neither branch naming nor body reference may match.
          # If multiple unique PRs match across all paths, fail safely rather than
          # picking ambiguously.
          open_prs_json="$(gh pr list \
            --repo "$REPOSITORY" \
            --state open \
            --json number,headRefName,body,author)"

          # Path 1: branch naming convention.
          branch_matched_prs="$(jq -r --arg prefix "agent/issue-${issue_number}-" \
            '[.[] | select(.headRefName | startswith($prefix)) | .number | tostring] | join("\n")' \
            <<<"$open_prs_json")"

          # Path 2: durable issue reference in PR body.
          body_matched_prs="$(jq -r --arg n "$issue_number" \
            '[.[] | select((.body // "") | test("(?i)(closes|fixes|resolves|relates to)\\s+#" + $n + "([^0-9]|$)")) | .number | tostring] | join("\n")' \
            <<<"$open_prs_json")"

          # Path 3: Copilot-authored PR when the issue has a known Copilot assignee.
          # Only matches PRs whose body either has no issue reference at all, or
          # already references this issue — this prevents false-positives when
          # multiple Copilot issues are in flight and an unrelated Copilot PR
          # references a different issue.
          copilot_matched_prs=""
          copilot_login="$(jq -r '.assignees[] | select(.login == "Copilot" or .login == "copilot-swe-agent[bot]") | .login' <<<"$issue_json" | head -1)"
          if [[ -n "$copilot_login" ]]; then
            # Accept both known Copilot login forms for PR author matching.
            # GitHub has returned "Copilot" (issue assignee) and "copilot-swe-agent[bot]"
            # (historical) — the issue assignee and PR author contexts may differ.
            copilot_matched_prs="$(jq -r --arg n "$issue_number" \
              '[.[] |
                select(.author.login == "Copilot" or .author.login == "copilot-swe-agent[bot]") |
                select(
                  ((.body // "") | test("(?i)(closes|fixes|resolves|relates to)\\s+#[0-9]+") | not)
                  or
                  ((.body // "") | test("(?i)(closes|fixes|resolves|relates to)\\s+#" + $n + "([^0-9]|$)"))
                ) |
                .number | tostring
              ] | join("\n")' \
              <<<"$open_prs_json")"
          fi

          unique_matched_prs="$(printf '%s\n%s\n%s\n' "$branch_matched_prs" "$body_matched_prs" "$copilot_matched_prs" | sed '/^$/d' | sort -n -u)"

          pr_number=""
          match_count=0
          if [[ -n "$unique_matched_prs" ]]; then
            match_count="$(echo "$unique_matched_prs" | wc -l | tr -d ' ')"
          fi

          if [[ "$match_count" -gt 1 ]]; then
            run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "Ambiguous: ${match_count} open PRs match issue #${issue_number} across discovery paths — manual resolution required." >&2
            echo "Branch matches: $(echo "$branch_matched_prs" | tr '\n' ' ')" >&2
            echo "Body matches: $(echo "$body_matched_prs" | tr '\n' ' ')" >&2
            echo "Copilot-authored matches: $(echo "$copilot_matched_prs" | tr '\n' ' ')" >&2
            echo "Matched PR numbers: $(echo "$unique_matched_prs" | tr '\n' ' ')" >&2
            gh issue comment "$issue_number" \
              --repo "$REPOSITORY" \
              --body "Review tracer found ${match_count} open PRs matching issue #${issue_number} across discovery paths. Ambiguous match — manual resolution required. Branch matches: $(echo "$branch_matched_prs" | tr '\n' ' '). Body-reference matches: $(echo "$body_matched_prs" | tr '\n' ' '). Copilot-authored matches: $(echo "$copilot_matched_prs" | tr '\n' ' '). Unique matched PRs: $(echo "$unique_matched_prs" | tr '\n' ' '). Workflow run: ${run_url}"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "needs_body_patch=false" >> "$GITHUB_OUTPUT"
            exit 0
          elif [[ "$match_count" -eq 1 ]]; then
            pr_number="$unique_matched_prs"
            echo "Resolved: issue #${issue_number} -> PR #${pr_number}." >&2
          fi

          if [[ -z "$pr_number" ]]; then
            echo "No open PR found for issue #${issue_number} (checked: branch naming convention, PR body reference, Copilot assignee) — skipping." >&2
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "needs_body_patch=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check whether the discovered PR body contains a durable issue reference.
          # If not, the review job will patch the PR body before running its full
          # analysis so future label-triggered runs can find the PR by body reference
          # (Path 2) without depending on Copilot branch names.
          needs_body_patch="false"
          pr_body_in_list="$(jq -r --arg n "$pr_number" '.[] | select(.number | tostring == $n) | .body // ""' <<<"$open_prs_json")"
          if ! echo "$pr_body_in_list" | grep -qiE "(closes|fixes|resolves|relates to)\s+#${issue_number}([^0-9]|$)"; then
            needs_body_patch="true"
          fi

          echo "Resolved: issue #${issue_number} -> PR #${pr_number}." >&2
          echo "pr_number=${pr_number}" >> "$GITHUB_OUTPUT"
          echo "issue_number=${issue_number}" >> "$GITHUB_OUTPUT"
          echo "should_run=true" >> "$GITHUB_OUTPUT"
          echo "needs_body_patch=${needs_body_patch}" >> "$GITHUB_OUTPUT"

  review:
    name: Inspect pull request and post structured review findings
    needs: resolve
    if: needs.resolve.outputs.should_run == 'true'
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ github.token }}
      PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
      TRIGGER_ISSUE_NUMBER: ${{ needs.resolve.outputs.issue_number }}
      REPOSITORY: ${{ github.repository }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Add durable issue reference to PR body if missing
        if: needs.resolve.outputs.needs_body_patch == 'true'
        shell: bash
        run: |
          set -euo pipefail

          pr_json="$(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}")"
          current_body="$(jq -r '.body // ""' <<<"$pr_json")"

          # Re-check in case the body was updated between resolve and now.
          if ! echo "$current_body" | grep -qiE "(closes|fixes|resolves|relates to)\s+#${TRIGGER_ISSUE_NUMBER}([^0-9]|$)"; then
            patched_body="$(printf '%s\n\nRelates to #%s' "$current_body" "$TRIGGER_ISSUE_NUMBER")"
            jq -n --arg body "$patched_body" '{body: $body}' | \
              gh api \
                --method PATCH \
                "repos/${REPOSITORY}/pulls/${PR_NUMBER}" \
                --input -

            gh issue comment "$TRIGGER_ISSUE_NUMBER" \
              --repo "$REPOSITORY" \
              --body "Review tracer added a missing \`Relates to #${TRIGGER_ISSUE_NUMBER}\` reference to PR #${PR_NUMBER} body for durable discovery. Workflow run: ${RUN_URL}"
          fi

      - name: Validate pull request and extract linked issue
        id: validate
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "pr_number must be numeric." >&2
            exit 1
          fi

          pr_json="$(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}")"

          pr_state="$(jq -r '.state' <<<"$pr_json")"
          if [[ "$pr_state" != "open" ]]; then
            echo "#${PR_NUMBER} is not an open pull request (state: ${pr_state})." >&2
            exit 1
          fi

          pr_body="$(jq -r '.body // ""' <<<"$pr_json")"
          pr_title="$(jq -r '.title' <<<"$pr_json")"
          head_sha="$(jq -r '.head.sha' <<<"$pr_json")"
          base_ref="$(jq -r '.base.ref' <<<"$pr_json")"

          # Extract the first linked issue number from the PR body.
          # Matches patterns: "Closes #N", "Relates to #N", "Fixes #N", bare "#N" references.
          linked_issue=""
          if echo "$pr_body" | grep -qiE '(closes|fixes|resolves|relates to)\s+#[0-9]+'; then
            linked_issue="$(echo "$pr_body" | grep -ioE '(closes|fixes|resolves|relates to)\s+#[0-9]+' | head -1 | grep -oE '[0-9]+')"
          elif echo "$pr_body" | grep -qE '#[0-9]+'; then
            linked_issue="$(echo "$pr_body" | grep -oE '#[0-9]+' | head -1 | tr -d '#')"
          fi

          issue_number="$linked_issue"
          if [[ -n "$TRIGGER_ISSUE_NUMBER" ]]; then
            # For label-triggered runs, TRIGGER_ISSUE_NUMBER is authoritative for
            # issue state transitions. PR-body links are evidence, not the state
            # target.
            issue_number="$TRIGGER_ISSUE_NUMBER"
          fi

          echo "pr_title=${pr_title}" >> "$GITHUB_OUTPUT"
          echo "head_sha=${head_sha}" >> "$GITHUB_OUTPUT"
          echo "base_ref=${base_ref}" >> "$GITHUB_OUTPUT"
          echo "linked_issue=${linked_issue}" >> "$GITHUB_OUTPUT"
          echo "issue_number=${issue_number}" >> "$GITHUB_OUTPUT"

          # Write PR body to a temp file for later steps.
          echo "$pr_body" > "$RUNNER_TEMP/pr-body.txt"

      - name: Inspect changed files and CI check status
        id: inspect
        shell: bash
        run: |
          set -euo pipefail

          head_sha="${{ steps.validate.outputs.head_sha }}"

          # Gather changed files.
          gh pr view "$PR_NUMBER" \
            --repo "$REPOSITORY" \
            --json files \
            --jq '[.files[].path] | join("\n")' \
            > "$RUNNER_TEMP/changed-files.txt"

          # Gather CI check runs for the head commit. Some repository or token
          # configurations may not allow check-run access; review should still
          # post a durable result when that happens.
          check_runs_json="[]"
          checks_unavailable=""
          if ! check_runs_json="$(
            gh api "repos/${REPOSITORY}/commits/${head_sha}/check-runs" \
              --jq '[.check_runs[] | {name: .name, status: .status, conclusion: .conclusion}]' \
              2> "$RUNNER_TEMP/check-runs-error.txt"
          )"; then
            checks_unavailable="CI check-run inspection was unavailable: $(tr '\n' ' ' < "$RUNNER_TEMP/check-runs-error.txt")"
            check_runs_json="[]"
          fi

          failed_checks="$(
            echo "$check_runs_json" \
              | jq -r '.[] | select(.conclusion != null and .conclusion != "success" and .conclusion != "skipped" and .conclusion != "neutral") | "  - \(.name): \(.conclusion)"'
          )"

          pending_checks="$(
            echo "$check_runs_json" \
              | jq -r '.[] | select(.status != "completed") | "  - \(.name): \(.status)"'
          )"

          echo "$failed_checks" > "$RUNNER_TEMP/failed-checks.txt"
          echo "$pending_checks" > "$RUNNER_TEMP/pending-checks.txt"
          echo "$checks_unavailable" > "$RUNNER_TEMP/checks-unavailable.txt"

          total_checks="$(echo "$check_runs_json" | jq 'length')"

          all_passed="false"
          if [[ -n "$checks_unavailable" ]]; then
            all_passed="unknown (check-run inspection unavailable)"
          elif [[ "$total_checks" -eq 0 ]]; then
            all_passed="n/a (no checks configured)"
          elif [[ -z "$failed_checks" && -z "$pending_checks" ]]; then
            all_passed="true"
          fi

          echo "all_passed=${all_passed}" >> "$GITHUB_OUTPUT"

      - name: Analyse PR body and build findings
        id: analyse
        shell: bash
        run: |
          set -euo pipefail

          pr_body="$(cat "$RUNNER_TEMP/pr-body.txt")"
          linked_issue="${{ steps.validate.outputs.linked_issue }}"
          issue_number="${{ steps.validate.outputs.issue_number }}"
          all_passed="${{ steps.inspect.outputs.all_passed }}"

          has_tracer_evidence="false"
          if echo "$pr_body" | grep -qiE "implementation tracer|tracer evidence|tracer run"; then
            has_tracer_evidence="true"
          fi

          has_issue_link="false"
          if [[ -n "$linked_issue" ]]; then
            has_issue_link="true"
          fi

          has_verification="false"
          if echo "$pr_body" | grep -qiE "^##+ Verification|^Verification performed|Verification:"; then
            has_verification="true"
          fi

          findings_found="false"
          has_high="false"
          requires_human="false"
          all_agent_fixable="false"
          linked_issue_conflict="false"
          > "$RUNNER_TEMP/findings.txt"

          if [[ "$has_issue_link" == "false" ]]; then
            echo "- **Missing issue link** (low): PR body does not contain a recognisable linked issue reference. Add a 'Relates to #NNN' line. Agent-fixable: yes." >> "$RUNNER_TEMP/findings.txt"
            findings_found="true"
          else
            if [[ -n "$TRIGGER_ISSUE_NUMBER" && "$linked_issue" != "$TRIGGER_ISSUE_NUMBER" ]]; then
              echo "- **Linked issue conflicts with trigger issue** (high): PR body first links issue #${linked_issue}, but this label-triggered run came from issue #${TRIGGER_ISSUE_NUMBER}. Review tracer will not transition any issue labels or dispatch a fix agent until a human confirms the correct PR/issue pair. Agent-fixable: no — human review required." >> "$RUNNER_TEMP/findings.txt"
              findings_found="true"
              has_high="true"
              requires_human="true"
              linked_issue_conflict="true"
            else
              issue_json="$(gh api "repos/${REPOSITORY}/issues/${linked_issue}" 2>/dev/null || echo '{}')"
              issue_state="$(jq -r '.state // "unknown"' <<<"$issue_json")"
              issue_labels="$(jq -r '[.labels[].name] | join(",")' <<<"$issue_json" 2>/dev/null || echo '')"

              if [[ "$issue_state" == "closed" ]]; then
                echo "- **Linked issue is closed** (low): Issue #${linked_issue} is closed. Verify this PR targets the correct issue. Agent-fixable: no — human review required." >> "$RUNNER_TEMP/findings.txt"
                findings_found="true"
                requires_human="true"
              fi

              if [[ -n "$issue_labels" ]] && ! echo "$issue_labels" | grep -q "needs-review"; then
                echo "- **Linked issue not in needs-review** (low): Issue #${linked_issue} does not have the \`needs-review\` label. The review tracer is typically dispatched when work is in \`needs-review\`. Agent-fixable: no — human review required." >> "$RUNNER_TEMP/findings.txt"
                findings_found="true"
                requires_human="true"
              fi
            fi
          fi

          if [[ "$linked_issue_conflict" == "false" ]]; then
            if [[ "$has_tracer_evidence" == "false" ]]; then
              echo "- **No tracer evidence** (medium): PR body does not reference implementation tracer evidence. Confirm the PR was opened by the implementation tracer or add a tracer evidence note. Agent-fixable: yes." >> "$RUNNER_TEMP/findings.txt"
              findings_found="true"
            fi

            if [[ "$has_verification" == "false" ]]; then
              echo "- **Missing verification section** (low): PR body has no Verification section. Add verification steps performed. Agent-fixable: yes." >> "$RUNNER_TEMP/findings.txt"
              findings_found="true"
            fi

            failed_checks="$(cat "$RUNNER_TEMP/failed-checks.txt")"
            if [[ -n "$failed_checks" ]]; then
              {
                echo "- **Failed CI checks** (high): One or more CI checks failed. Human judgment required to determine next action."
                echo "$failed_checks"
              } >> "$RUNNER_TEMP/findings.txt"
              findings_found="true"
              has_high="true"
              requires_human="true"
            fi

            pending_checks="$(cat "$RUNNER_TEMP/pending-checks.txt")"
            if [[ -n "$pending_checks" ]]; then
              {
                echo "- **Pending CI checks** (informational): CI checks are still running. Re-run review tracer once checks complete. Agent-fixable: no — human review required."
                echo "$pending_checks"
              } >> "$RUNNER_TEMP/findings.txt"
              findings_found="true"
              requires_human="true"
            fi

            checks_unavailable="$(cat "$RUNNER_TEMP/checks-unavailable.txt")"
            if [[ -n "$checks_unavailable" ]]; then
              echo "- **CI check inspection unavailable** (informational): ${checks_unavailable} Review body, linked issue, and changed files were still inspected. Agent-fixable: no — repository or token configuration may require human follow-up." >> "$RUNNER_TEMP/findings.txt"
              findings_found="true"
              requires_human="true"
            fi

            if [[ "$findings_found" == "true" && "$requires_human" == "false" && "$has_high" == "false" ]]; then
              all_agent_fixable="true"
            fi
          fi

          echo "findings_found=${findings_found}" >> "$GITHUB_OUTPUT"
          echo "has_high=${has_high}" >> "$GITHUB_OUTPUT"
          echo "requires_human=${requires_human}" >> "$GITHUB_OUTPUT"
          echo "all_agent_fixable=${all_agent_fixable}" >> "$GITHUB_OUTPUT"
          echo "linked_issue_conflict=${linked_issue_conflict}" >> "$GITHUB_OUTPUT"

      - name: Post structured review comment
        id: post_comment
        shell: bash
        env:
          PR_TITLE: ${{ steps.validate.outputs.pr_title }}
        run: |
          set -euo pipefail

          findings_found="${{ steps.analyse.outputs.findings_found }}"
          linked_issue_conflict="${{ steps.analyse.outputs.linked_issue_conflict }}"
          linked_issue="${{ steps.validate.outputs.linked_issue }}"
          pr_title="${PR_TITLE}"
          all_passed="${{ steps.inspect.outputs.all_passed }}"

          linked_issue_text="Not found in PR body."
          if [[ -n "$linked_issue" ]]; then
            linked_issue_text="#${linked_issue}"
          fi

          if [[ "$linked_issue_conflict" == "true" ]]; then
            result_header="## Review Tracer: Linked-Issue Conflict"
            result_body="The review tracer found a conflict between the label-triggered issue and the first linked issue in the PR body. It posted this PR evidence only; issue label transitions and fix-agent dispatch were suppressed pending human resolution."
          elif [[ "$findings_found" == "true" ]]; then
            result_header="## Review Tracer: Findings Require Attention"
            result_body="The review tracer found items that require attention before this PR is ready for final human review."
          else
            result_header="## Review Tracer: No Findings"
            result_body="The review tracer found no structural or evidence issues. This PR is ready for final human review and merge."
          fi

          changed_files="$(cat "$RUNNER_TEMP/changed-files.txt")"

          {
            echo "${result_header}"
            echo ""
            echo "${result_body}"
            echo ""
            echo "---"
            echo ""
            echo "**Pull request:** #${PR_NUMBER} — ${pr_title}"
            echo "**Linked issue:** ${linked_issue_text}"
            echo "**CI checks passed:** ${all_passed}"
            echo "**Workflow run:** ${RUN_URL}"
            echo ""
            echo "### Changed files"
            echo ""
            echo '```'
            if [[ -n "$changed_files" ]]; then
              echo "$changed_files"
            else
              echo "none"
            fi
            echo '```'
            echo ""
            echo "### Findings"
            echo ""
            if [[ "$findings_found" == "true" ]]; then
              cat "$RUNNER_TEMP/findings.txt"
            else
              echo "No findings."
            fi
            echo ""
            echo "---"
            echo ""
            echo "> **This is tracer review evidence only.** It is not a final human review. It does not approve, merge, or imply that human final review is complete. Human approval and merge remain required."
          } > "$RUNNER_TEMP/review-comment.md"

          gh pr comment "$PR_NUMBER" \
            --repo "$REPOSITORY" \
            --body-file "$RUNNER_TEMP/review-comment.md"

      - name: Move linked issue to needs-fix when findings require changes
        if: steps.analyse.outputs.findings_found == 'true' && steps.analyse.outputs.linked_issue_conflict == 'false' && steps.validate.outputs.issue_number != ''
        shell: bash
        run: |
          set -euo pipefail

          linked_issue="${{ steps.validate.outputs.issue_number }}"
          ensure_label() {
            local label="$1"
            local labels="$2"
            if ! echo ",$labels," | grep -q ",${label},"; then
              gh issue edit "$linked_issue" \
                --repo "$REPOSITORY" \
                --add-label "$label"
            fi
          }

          remove_label_if_present() {
            local label="$1"
            local labels="$2"
            if echo ",$labels," | grep -q ",${label},"; then
              gh issue edit "$linked_issue" \
                --repo "$REPOSITORY" \
                --remove-label "$label"
            fi
          }

          issue_json="$(gh api "repos/${REPOSITORY}/issues/${linked_issue}" 2>/dev/null || echo '{}')"
          if jq -e '.number != null' <<<"$issue_json" >/dev/null; then
            issue_labels="$(jq -r '[.labels[].name] | join(",")' <<<"$issue_json")"
            ensure_label "needs-fix" "$issue_labels"
            remove_label_if_present "needs-review" "$issue_labels"

            if [[ "${{ steps.analyse.outputs.has_high }}" == "true" || "${{ steps.analyse.outputs.requires_human }}" == "true" ]]; then
              refreshed_labels="$(gh api "repos/${REPOSITORY}/issues/${linked_issue}" --jq '[.labels[].name] | join(",")')"
              ensure_label "blocked:human" "$refreshed_labels"
              gh issue comment "$linked_issue" \
                --repo "$REPOSITORY" \
                --body "Review tracer found findings on PR #${PR_NUMBER} that require human judgment or include high severity. Moved to \`needs-fix\` + \`blocked:human\`; fix agent was not dispatched. Workflow run: ${RUN_URL}"
            else
              gh issue comment "$linked_issue" \
                --repo "$REPOSITORY" \
                --body "Review tracer found agent-fixable items on PR #${PR_NUMBER}. Moved to \`needs-fix\` and dispatching fix agent. Workflow run: ${RUN_URL}"
            fi

            final_labels="$(gh api "repos/${REPOSITORY}/issues/${linked_issue}" --jq '[.labels[].name] | join(",")')"
            if ! echo ",$final_labels," | grep -q ",needs-fix,"; then
              echo "Issue #${linked_issue} is missing needs-fix after review-tracer transition." >&2
              exit 1
            fi

            if echo ",$final_labels," | grep -q ",needs-review,"; then
              echo "Issue #${linked_issue} still has needs-review after review-tracer findings transition." >&2
              exit 1
            fi

            if [[ "${{ steps.analyse.outputs.has_high }}" == "true" || "${{ steps.analyse.outputs.requires_human }}" == "true" ]] && ! echo ",$final_labels," | grep -q ",blocked:human,"; then
              echo "Issue #${linked_issue} is missing blocked:human after human-escalation findings." >&2
              exit 1
            fi
          fi

      - name: Dispatch fix agent for all-agent-fixable findings
        if: steps.analyse.outputs.all_agent_fixable == 'true' && steps.analyse.outputs.linked_issue_conflict == 'false' && steps.validate.outputs.issue_number != ''
        shell: bash
        run: |
          set -euo pipefail

          findings_summary="$(tr '\n' ' ' < "$RUNNER_TEMP/findings.txt" | cut -c1-900)"

          gh workflow run fix-agent.yml \
            --repo "$REPOSITORY" \
            -f "pr_number=${PR_NUMBER}" \
            -f "issue_number=${{ steps.validate.outputs.issue_number }}" \
            -f "review_run_url=${RUN_URL}" \
            -f "findings_summary=${findings_summary}"

      - name: Leave needs-review on linked issue when no findings
        if: steps.analyse.outputs.findings_found == 'false' && steps.analyse.outputs.linked_issue_conflict == 'false' && steps.validate.outputs.issue_number != ''
        shell: bash
        run: |
          set -euo pipefail

          linked_issue="${{ steps.validate.outputs.issue_number }}"

          issue_json="$(gh api "repos/${REPOSITORY}/issues/${linked_issue}" 2>/dev/null || echo '{}')"
          if jq -e '.number != null' <<<"$issue_json" >/dev/null; then
            gh issue comment "$linked_issue" \
              --repo "$REPOSITORY" \
              --body "Review tracer found no issues on PR #${PR_NUMBER}. Issue remains in \`needs-review\` pending final human approval and merge. Workflow run: ${RUN_URL}"
          fi
